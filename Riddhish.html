<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Click Me</title>
	<style>
		html,body {height:100%; margin:0; background:#000; display:flex; align-items:center; justify-content:center; font-family:Inter, Arial, sans-serif; color:#fff}
		.container {text-align:center}
		#clickBtn {font-size:24px; padding:18px 36px; border-radius:12px; border:0; cursor:pointer; background:linear-gradient(45deg,#ff6b6b,#f06595); color:#fff; box-shadow:0 8px 24px rgba(0,0,0,0.4); transition:transform 0.12s ease, box-shadow 0.12s ease}
		#clickBtn:active {transform:scale(.98)}
		#count {margin-top:14px; font-size:18px; opacity:.95}
	</style>
</head>
<body>
	<div class="container">
		<h1>RIDDHISH</h1>
		<button id="clickBtn">Click Me</button>
		<div id="count">Clicks: 0</div>
	</div>
	<script>
		const btn = document.getElementById('clickBtn');
		const countEl = document.getElementById('count');
		let clicks = 0;
		btn.addEventListener('click', () => {
			clicks++;
			countEl.textContent = 'Clicks: ' + clicks;
			document.body.style.transition = 'background 0.18s ease';
			document.body.style.background = '#0a0a0a';
			setTimeout(() => { document.body.style.background = '#000'; }, 150);
		});
	</script>
</body>
</html>
